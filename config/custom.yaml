zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null
  ignore_path: null

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.gmail.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: ${oc.env:OPENAI_API_BASE}
  generation_kwargs:
    model: gpt-5.4
  language: Chinese

source:
  arxiv:
    category: ["q-bio.GN", "q-bio.QM", "q-bio.MN", "q-bio.CB", "cs.LG", "stat.ML", "cs.AI"]
    include_cross_list: true
  biorxiv:
    category: ["bioinformatics", "genomics"]
  openalex:
    api_key: ${oc.env:OPENALEX_API_KEY}
    journals:
      - "Nature Genetics"
      - "Nature Methods"
      - "Nature Communications"
      - "Nature Computational Science"
      - "Nature Machine Intelligence"
      - "IEEE Transactions on Pattern Analysis and Machine Intelligence"
      - "IEEE Transactions on Knowledge and Data Engineering"
      - "Communications Biology"
      - "Genome Biology"
      - "Genome Research"
      - "Advanced Science"
      - "Science Advances"
      - "Cell Genomics"
      - "Genome Medicine"
    conferences:
      - "International Conference on Learning Representations"
      - "International Conference on Machine Learning"
      - "Proceedings of the AAAI Conference on Artificial Intelligence"
      - "Knowledge Discovery and Data Mining"
    lookback_days: 3
    journals_lookback_days: 365
    conferences_lookback_days: 730
    max_results: 500
  acl_anthology:
    events:
      - "acl"
      - "emnlp"
    lookback_years: 2
    max_results: 5000
  neurips:
    lookback_years: 2
    max_results: 300

paper_filter:
  include_any:
    - "graph self-supervised learning"
    - "self-supervised graph learning"
    - "graph contrastive learning"
    - "graph representation learning"
    - "graph generative model"
    - "deep generative model"
    - "flow matching"
    - "rectified flow"
    - "diffusion"
    - "energy model"
    - "energy-based model"
    - "score matching"
    - "score-based model"
    - "normalizing flow"
    - "variational autoencoder"
    - "foundation model"
    - "large language model"
    - "multimodal large language model"
    - "knowledge graph"
    - "AI agent"
    - "LLM agent"
    - "agentic workflow"
    - "multi-agent system"
    - "tool-using agent"
    - "reasoning agent"
    - "causal inference"
    - "causal discovery"
    - "causal representation learning"

  include_groups:
    - name: "spatial-omics-computation"
      all:
        - any:
            - "spatial transcriptomics"
            - "spatial omics"
            - "spatial multi-omics"
            - "spatial multiomics"
            - "spatial proteomics"
            - "spatial metabolomics"
            - "spatially resolved transcriptomics"
            - "spatially resolved omics"
        - any:
            - "computational"
            - "algorithm"
            - "method"
            - "model"
            - "framework"
            - "machine learning"
            - "deep learning"
            - "integration"
            - "deconvolution"
            - "clustering"
            - "representation learning"
            - "benchmark"
            - "inference"
            - "perturbation"
            - "perturb-seq"
            - "simulation"
            - "simulator"
            - "synthetic data"

    - name: "cell-communication-computation"
      all:
        - any:
            - "cell-cell communication"
            - "cell cell communication"
            - "cellular communication"
            - "intercellular communication"
            - "cell-cell interaction"
            - "cellular interaction"
            - "ligand-receptor interaction"
            - "ligand receptor interaction"
            - "niche analysis"
            - "cellular niche"
            - "tissue niche"
        - any:
            - "computational"
            - "inference"
            - "prediction"
            - "algorithm"
            - "method"
            - "model"
            - "framework"
            - "network analysis"
            - "machine learning"
            - "causal inference"
            - "perturbation"

    - name: "single-cell-computation"
      all:
        - any:
            - "single-cell"
            - "single cell"
            - "scRNA-seq"
            - "scATAC-seq"
            - "CITE-seq"
            - "single-cell multi-omics"
        - any:
            - "computational"
            - "algorithm"
            - "method"
            - "model"
            - "framework"
            - "integration"
            - "annotation"
            - "inference"
            - "representation learning"

    - name: "single-cell-perturbation"
      all:
        - any:
            - "single-cell"
            - "single cell"
            - "scRNA-seq"
            - "single-cell omics"
            - "single-cell multi-omics"
        - any:
            - "perturbation"
            - "perturb-seq"
            - "crispr screen"
            - "genetic perturbation"
            - "chemical perturbation"
            - "drug perturbation"
            - "interventional"
            - "counterfactual"
            - "causal inference"
            - "causal discovery"
            - "treatment effect"

    - name: "spatial-omics-perturbation"
      all:
        - any:
            - "spatial transcriptomics"
            - "spatial omics"
            - "spatial multi-omics"
            - "spatial multiomics"
            - "spatially resolved transcriptomics"
        - any:
            - "perturbation"
            - "spatial perturbation"
            - "perturb-seq"
            - "crispr"
            - "interventional"
            - "counterfactual"
            - "causal inference"
            - "causal discovery"

    - name: "omics-simulation"
      all:
        - any:
            - "single-cell"
            - "single cell"
            - "single-cell omics"
            - "spatial transcriptomics"
            - "spatial omics"
            - "spatial multi-omics"
            - "spatial multiomics"
        - any:
            - "simulation"
            - "simulator"
            - "synthetic data"
            - "data generation"
            - "benchmark simulation"
            - "in silico"
            - "generative model"
            - "digital twin"

    - name: "statistical-bioinformatics"
      all:
        - any:
            - "bioinformatics"
            - "computational biology"
            - "genomics"
            - "transcriptomics"
            - "proteomics"
            - "metabolomics"
            - "epigenomics"
            - "multi-omics"
            - "multiomics"
            - "single-cell"
            - "single cell"
            - "spatial omics"
            - "spatial transcriptomics"
            - "gene expression"
            - "sequencing data"
        - any:
            - "statistical analysis"
            - "statistical inference"
            - "probabilistic analysis"
            - "probabilistic model"
            - "probabilistic modeling"
            - "probabilistic modelling"
            - "bayesian"
            - "bayes"
            - "variational inference"
            - "markov chain monte carlo"
            - "monte carlo"
            - "probabilistic graphical model"
            - "latent variable model"
            - "generalized linear model"
            - "generalised linear model"
            - "mixed-effects model"
            - "mixed effect model"
            - "hierarchical model"
            - "count model"
            - "zero-inflated"
            - "compositional data analysis"
            - "hypothesis testing"
            - "multiple testing"
            - "false discovery rate"
            - "uncertainty quantification"
            - "causal inference"
            - "causal discovery"
            - "causal model"
            - "causal effect"
            - "treatment effect"

  exclude_keywords:
    - "clinical trial"
    - "randomized controlled trial"
    - "randomised controlled trial"
    - "case report"
    - "case series"
    - "patient recruitment"
    - "treatment outcome"
    - "surgical procedure"
    - "clinical guideline"
    - "clinical practice"
    - "hospitalized patient"

tracking:
  enabled: true
  sources: ["openalex", "semantic_scholar", "arxiv", "biorxiv"]
  output_dir: papers/tracking
  daily_history_enabled: true
  daily_history_path: papers/tracking/daily_history.json
  manual_history_enabled: false
  manual_history_path: papers/tracking/manual_history.json
  daily_lookback_days: 3
  manual_lookback_days: 30
  max_results: 100
  max_results_per_researcher: 50
  min_confidence_for_summary: medium
  download_pdfs: true
  semantic_scholar_api_key: ${oc.env:SEMANTIC_SCHOLAR_API_KEY,null}
  researchers: []
  groups: []

archive:
  enabled: true
  output_dir: papers/daily
  download_pdfs: true

daily_history:
  enabled: true
  path: papers/daily/history.json
  skip_when_debug: true

executor:
  debug: ${oc.env:DEBUG,false}
  send_empty: true
  max_paper_num: 30
  min_relevance_score: 2
  source: ["arxiv", "biorxiv", "openalex", "acl_anthology", "neurips"]
  reranker: local
