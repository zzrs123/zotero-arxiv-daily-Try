name: CI
on:
  workflow_dispatch:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.1.4

      - name: Run Pytest
        run: |
          # Keep CI deterministic: the slow local-reranker test downloads a
          # large Hugging Face model and is covered by real daily/test runs.
          uv run pytest --cov=src/zotero_arxiv_daily --cov-report=term-missing
