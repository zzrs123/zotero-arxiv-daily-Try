name: Track researchers and groups
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Tracking mode: manual uses 30 days by default; daily uses daily_lookback_days"
        required: true
        default: "manual"
        type: choice
        options:
          - "manual"
          - "daily"
      from_date:
        description: "Optional start date (YYYY-MM-DD); blank uses mode default"
        required: false
        default: ""
        type: string
      to_date:
        description: "Optional end date (YYYY-MM-DD); blank uses today"
        required: false
        default: ""
        type: string
      max_results:
        description: "Maximum number of results"
        required: true
        default: "100"
        type: string
      summarize:
        description: "Generate Chinese summaries using the configured LLM"
        required: true
        default: true
        type: boolean
      send_email:
        description: "Send tracking results by email"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "0 23 * * *"

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Track researchers and groups
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: gpt-5.4
          SUMMARY_LANGUAGE: Chinese
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          TRACK_EVENT_NAME: ${{ github.event_name }}
          TRACK_MODE_INPUT: ${{ inputs.mode || 'manual' }}
          TRACK_FROM_DATE: ${{ inputs.from_date || '' }}
          TRACK_TO_DATE: ${{ inputs.to_date || '' }}
          TRACK_MAX_RESULTS: ${{ inputs.max_results || '100' }}
          TRACK_SUMMARIZE: ${{ inputs.summarize || 'true' }}
          TRACK_SEND_EMAIL: ${{ inputs.send_email || 'false' }}
        run: |
          mode="$TRACK_MODE_INPUT"
          send_email=""
          if [ "$TRACK_EVENT_NAME" = "schedule" ]; then
            mode="daily"
            TRACK_SEND_EMAIL="true"
          fi
          from_arg=""
          to_arg=""
          summarize=""
          if [ -n "$TRACK_FROM_DATE" ]; then from_arg="--from-date $TRACK_FROM_DATE"; fi
          if [ -n "$TRACK_TO_DATE" ]; then to_arg="--to-date $TRACK_TO_DATE"; fi
          if [ "$TRACK_SUMMARIZE" = "true" ]; then summarize="--summarize"; fi
          if [ "$TRACK_SEND_EMAIL" = "true" ]; then send_email="--send-email"; fi
          uv run python -m zotero_arxiv_daily.tracking \
            --mode "$mode" \
            $from_arg \
            $to_arg \
            --max-results "$TRACK_MAX_RESULTS" \
            $summarize \
            $send_email
      - name: Upload tracking archive
        uses: actions/upload-artifact@v4
        with:
          name: researcher-tracking-results
          path: papers/tracking
          retention-days: 30
      - name: Show archive location
        if: always()
        run: |
          echo "## Researcher tracking archive" >> "$GITHUB_STEP_SUMMARY"
          echo "Download **researcher-tracking-results** from the Artifacts section of this run." >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          find papers/tracking -maxdepth 3 -type f -print 2>/dev/null | sort >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Commit daily tracking metadata and history
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add papers/tracking/daily_history.json || true
          find papers/tracking -type f \( -name papers.csv -o -name summaries.md -o -name uncertain.md \) -print0 | xargs -0 --no-run-if-empty git add --
          if git diff --cached --quiet; then
            echo "No tracking metadata changes to commit"
          else
            git commit -m "chore: update researcher tracking archive [skip ci]"
            git push
          fi