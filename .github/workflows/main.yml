name: Send emails daily
permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Verify main branch checkout
        run: |
          git fetch origin main --depth=1
          current_sha="$(git rev-parse HEAD)"
          main_sha="$(git rev-parse origin/main)"
          echo "Current SHA: $current_sha"
          echo "origin/main SHA: $main_sha"
          if [ "$current_sha" != "$main_sha" ]; then
            echo "::error::Daily workflow is not running the latest origin/main commit."
            exit 1
          fi

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-jina-embeddings-v5-text-nano-retrieval-${{ runner.os }}
          restore-keys: |
            huggingface-jina-embeddings-v5-text-nano-retrieval-
            huggingface-

      - name: Run script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT: "120"
          DEBUG: "false"
        run: |
          echo "Use custom config: "
          cat config/custom.yaml
          uv run src/zotero_arxiv_daily/main.py

      - name: Upload daily paper archive
        uses: actions/upload-artifact@v4
        with:
          name: daily-paper-archive
          path: papers/daily/20??-??-??
          if-no-files-found: warn
          retention-days: 30

      - name: Show archive location
        if: always()
        run: |
          echo "## Daily archive" >> "$GITHUB_STEP_SUMMARY"
          echo "Download **daily-paper-archive** from the Artifacts section of this run." >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          find papers/daily -maxdepth 3 -type f -print 2>/dev/null | sort >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Commit daily metadata and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add papers/daily/history.json || true
          find papers/daily -type f \( -name papers.csv -o -name summaries.md \) -print0 | xargs -0 --no-run-if-empty git add --
          if git diff --cached --quiet; then
            echo "No daily metadata changes to commit"
          else
            git commit -m "chore: update daily paper archive [skip ci]"
            git push
          fi
